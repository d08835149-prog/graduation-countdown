<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f101a; --text: #ffffff; --muted: #d1d5db; --faint: #9ca3af; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* ── 전체 문구 배치 ── */
  .quotes-wrapper {
    position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    display: flex; justify-content: space-between; pointer-events: none;
    z-index: 0; padding: 2% 2%; overflow: hidden;
  }
  .quote-col { width: 20%; height: 100%; display: flex; flex-direction: column; animation: scroll 120s linear infinite; }
  .quote-item { 
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--faint); 
    padding: 18px 5px; text-align: center; line-height: 1.3;
  }
  @keyframes scroll { from { transform: translateY(0); } to { transform: translateY(-50%); } }

  .page { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem; }
  .hero { border-radius: 20px; padding: 3rem 2rem; text-align: center; margin: 2rem 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .hero-number { font-size: clamp(4rem, 15vw, 7rem); font-weight: 800; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card { border-radius: 12px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
  .timer-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
  .t-num { font-size: 1rem; font-weight: 600; display: block; }
  .t-unit { font-size: 7px; color: var(--faint); text-transform: uppercase; }
</style>
</head>
<body>

<div class="quotes-wrapper">
  <div class="quote-col" id="col-left"></div>
  <div class="quote-col" id="col-right"></div>
</div>

<div class="page">
  <header style="text-align:center;"><h1>Almost There.</h1></header>
  <div class="hero">
    <p>🏫 School days remaining</p>
    <div class="hero-number" id="school-num"></div>
  </div>
  <div class="cards">
    <div class="card"><div class="card-title" style="font-size:11px;">Ceremony</div><div id="timer-grad"></div></div>
    <div class="card"><div class="card-title" style="font-size:11px;">Trip</div><div id="timer-trip"></div></div>
    <div class="card"><div class="card-title" style="font-size:11px;">Last Day</div><div id="timer-last"></div></div>
  </div>
</div>

<script>
// PDF의 모든 문구 50개 배치
const allQuotes = [
  "Your life is your story. Write it well.", "The best time is now", "Not everything is a competition", "School taught me sleep 3 hours", "Tired", "A false spotlight shines to create the false sense of victory.", "Only when all the lights have been turned on can you see the entire room.", "Dream big, work hard, stay kind.", "Brain conflagrated, graduation successful.", "A quote doesn't decide who you are. You do.", "Gotta stay down and get it", "I knew this moment'd come", "Let your light shine", "What you learn today shapes your tomorrow.", "I wish that time would last forever", "Graduating just to go back to school again", "The saddest thing in life is wasted talent", "Choices shape your life", "Just another Bronx tale", "Sometimes it's the journey that teaches you", "My excuse is that I'm young", "Let your failures teach you", "Don't let others write your story", "Hard work never betrays you", "Sometimes you will never know the value of a moment",
  "I should've paid 50 robux to skip this stage", "No, I did not take this picture at home.", "People are going to judge you anyways", "Thank you, ChatGPT for helping me", "The best way to predict the future is to create it", "Have a happy day.", "Normal is boring.", "I don't run it.", "Swing hard, even if you miss", "Hard work beats talent", "Growth begins where comfort ends.", "How lucky am I to have something to make saying goodbye so hard.", "You miss 100% of the shots you don't take", "Even this quote was late.", "The most important thing in life is found in the journey", "May today's period be the first letter of tomorrow.", "It's not about being the best", "Thanks for the good memories", "Inspired by the Fear of being Average", "I didn't get here alone", "Endless gratitude to my mom, dad, and brother", "Now it's time to turn my dreams into something I'm proud of", "Don't look back", "Go confidently in the direction of your dreams", "Class of 2026"
];

const colLeft = document.getElementById('col-left');
const colRight = document.getElementById('col-right');

// 무한 루프 효과를 위해 문구를 복제하여 추가 (스크롤 자연스럽게)
const displayQuotes = [...allQuotes, ...allQuotes]; 

displayQuotes.forEach((q, i) => {
  const div = document.createElement('div'); div.className = 'quote-item'; div.textContent = q;
  if (i < displayQuotes.length / 2) colLeft.appendChild(div); else colRight.appendChild(div);
});

// 타이머 로직 (기존 동일)
const SCHOOL_DATES = ['2026-06-01','2026-06-02','2026-06-03','2026-06-04','2026-06-08','2026-06-09','2026-06-10','2026-06-11','2026-06-12','2026-06-15','2026-06-16','2026-06-17','2026-06-18','2026-06-19','2026-06-22','2026-06-23','2026-06-24','2026-06-25'];
const events = [{ id: 'grad', target: new Date(2026, 5, 15) }, { id: 'trip', target: new Date(2026, 5, 22) }, { id: 'last', target: new Date(2026, 5, 25) }];

function updateTimer() {
  document.getElementById('school-num').textContent = SCHOOL_DATES.filter(d => d >= new Date().toISOString().slice(0, 10)).length;
  events.forEach(e => {
    const ms = e.target - new Date();
    const d = Math.floor(ms / 86400000); const h = Math.floor((ms % 86400000) / 3600000);
    const m = Math.floor((ms % 3600000) / 60000); const s = Math.floor((ms % 60000) / 1000);
    const ms2 = Math.floor((ms % 1000) / 10);
    document.getElementById('timer-' + e.id).innerHTML = `
      <div class="timer-row">
        <div class="t-block"><span class="t-num">${d}</span><span class="t-unit">D</span></div>
        <div class="t-block"><span class="t-num">${h}</span><span class="t-unit">H</span></div>
        <div class="t-block"><span class="t-num">${m}</span><span class="t-unit">M</span></div>
        <div class="t-block"><span class="t-num">${s}</span><span class="t-unit">S</span></div>
        <div class="t-block"><span class="t-num">${ms2}</span><span class="t-unit">MS</span></div>
      </div>`;
  });
}
setInterval(updateTimer, 50); updateTimer();
</script>
</body>
</html>
